name = "blue-moon-web-do-not-deploy"
main = "src/worker/index.ts"
compatibility_date = "2025-10-08"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "./dist"
not_found_handling = "404-page"
binding = "ASSETS"

[build]
command = "npm run build"

[vars]
CONTACT_TO_EMAIL = "bluemoon.mandre@gmail.com"

[env.production]
name = "blue-moon-web"
main = "src/worker/index.ts"
compatibility_date = "2025-10-08"
compatibility_flags = ["nodejs_compat"]

[env.production.assets]
directory = "./dist"
not_found_handling = "404-page"
binding = "ASSETS"

[env.production.build]
command = "npm run build"

[env.production.vars]
CONTACT_TO_EMAIL = "bluemoon.mandre@gmail.com"

# Reservations + availability + per-month pricing.
# Create with:  wrangler d1 create blue-moon-prod
# Then paste the returned database_id below.
[[env.production.d1_databases]]
binding       = "DB"
database_name = "blue-moon-prod"
database_id   = "REPLACE_WITH_PROD_DB_ID"

[env.development]
name = "dev-blue-moon-web"
main = "src/worker/index.ts"
compatibility_date = "2025-10-08"
compatibility_flags = ["nodejs_compat"]

[env.development.assets]
directory = "./dist"
not_found_handling = "404-page"
binding = "ASSETS"

[env.development.build]
command = "npm run build"

[env.development.vars]
CONTACT_TO_EMAIL = "bluemoon.mandre@gmail.com"

# Create with:  wrangler d1 create blue-moon-dev
# Then paste the returned database_id below.
[[env.development.d1_databases]]
binding       = "DB"
database_name = "blue-moon-dev"
database_id   = "b46207a8-3c3b-41d4-b2b0-ec1f11fbbf14"
