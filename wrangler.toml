name = "blue-moon-web-default-DO-NOT-DEPLOY"
main = "src/worker/index.ts"
compatibility_date = "2025-10-08"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "./dist"
not_found_handling = "404-page"
binding = "ASSETS"

[build]
command = "npm run build"

